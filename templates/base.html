<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Nossa - {% block titulo %} {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
        <div class="max-lg:collapse bg-base-200 shadow-sm w-full rounded-md">
        <input id="navbar-1-toggle" class="peer hidden" type="checkbox" />
        <label for="navbar-1-toggle" class="fixed inset-0 hidden max-lg:peer-checked:block"></label>
        <div class="collapse-title navbar">
            <div class="navbar-start">
            <label for="navbar-1-toggle" class="btn btn-ghost lg:hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /></svg>
            </label>
            <button class="btn btn-ghost text-xl"><a href="{{url_for('index')}}">Pizza Nossa!</a></button>
            </div>
            <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1">
                <li><button> <a href="{{url_for('cardapio')}}">Cardápio</a></button></li>
                <li><button> <a href="{{url_for('avaliacoes')}}">Avaliações</a></button></li>
                <li><button><a href="{{url_for('faleconosco')}}">Fale conosco</a></button></li>
                <li><button><a href="{{url_for('login')}}">Login</a></button></li>

            </ul>
            </div>
            <div class="navbar-end">
            <input type="text" placeholder="Search" class="input input-bordered w-64 lg:w-auto" />
            </div>
        </div>

        <div class="collapse-content lg:hidden z-1">
            <ul class="menu">
            <li><button>Item 1</button></li>
            <li>
                <button>Parent</button>
                <ul>
                <li><button>Submenu 1</button></li>
                <li><button>Submenu 2</button></li>
                </ul>
            </li>
            <li><button>Item 3</button></li>
            
        </ul>
        </div>
        </div>

    <section>
       {% block conteudo %}
       {% endblock %}
    </section>
    
<footer class="footer sm:footer-horizontal bg-base-200 text-base-content p-10">
